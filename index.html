<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Financiamento | LED Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    
    <style>
        /* Fundo estilo Black Neon */
        body {
            background-color: #050505;
            color: #e2e8f0;
        }

        /* Animação Título Flutuante */
        @keyframes float {
            0%, 100% { transform: translateY(0px); filter: drop-shadow(0 0 5px #6366f1); }
            50% { transform: translateY(-15px); filter: drop-shadow(0 0 20px #6366f1); }
        }

        /* Animação Foguete */
        @keyframes rocket-launch {
            0% { transform: translateY(15px); opacity: 0; }
            50% { opacity: 1; filter: drop-shadow(0 0 8px #f43f5e); }
            100% { transform: translateY(-35px); opacity: 0; }
        }

        /* PULSOS LED DOS QUADROS */
        @keyframes led-green {
            0%, 100% { box-shadow: 0 0 5px #10b981, inset 0 0 5px #10b981; border-color: #10b981; }
            50% { box-shadow: 0 0 20px #10b981, inset 0 0 10px #10b981; border-color: #34d399; }
        }
        @keyframes led-red {
            0%, 100% { box-shadow: 0 0 5px #f43f5e, inset 0 0 5px #f43f5e; border-color: #f43f5e; }
            50% { box-shadow: 0 0 20px #f43f5e, inset 0 0 10px #f43f5e; border-color: #fb7185; }
        }

        /* NOVA ANIMAÇÃO: LED PISCANDO (BLINK) PARA O SALDO TOTAL */
        @keyframes led-blink-indigo {
            0%, 100% { 
                box-shadow: 0 0 5px #6366f1, inset 0 0 5px #6366f1; 
                border-color: #6366f1;
                opacity: 1;
            }
            50% { 
                box-shadow: 0 0 30px #6366f1, inset 0 0 15px #6366f1; 
                border-color: #818cf8;
                opacity: 0.8;
            }
        }

        .animate-float { display: inline-block; animation: float 3s ease-in-out infinite; }
        .led-green { border: 2px solid #10b981; animation: led-green 2s infinite; background: rgba(16, 185, 129, 0.05); }
        .led-red { border: 2px solid #f43f5e; animation: led-red 2s infinite; background: rgba(244, 63, 94, 0.05); }
        
        /* Classe de piscar aplicada ao Indigo */
        .led-blink-indigo { 
            border: 2px solid #6366f1; 
            animation: led-blink-indigo 1s steps(5, start) infinite; 
            background: rgba(99, 102, 241, 0.1); 
        }

        .animate-rocket { display: inline-block; animation: rocket-launch 1.5s linear infinite; }

        .text-led-green { color: #10b981; text-shadow: 0 0 8px rgba(16, 185, 129, 0.6); }
        .text-led-red { color: #f43f5e; text-shadow: 0 0 8px rgba(244, 63, 94, 0.6); }

        /* Inputs Estilo LED */
        input, select {
            background: #111 !important;
            border: 1px solid #333 !important;
            color: white !important;
            transition: 0.3s;
        }
        input:focus {
            border-color: #f43f5e !important;
            box-shadow: 0 0 15px rgba(244, 63, 94, 0.4);
            outline: none;
        }
    </style>
</head>
<body class="font-sans min-h-screen overflow-x-hidden">

    <div class="max-w-5xl mx-auto p-6 md:p-12">
        <header class="mb-12 text-center md:text-left">
            <div class="animate-float">
                <h1 class="text-5xl font-extrabold tracking-tighter italic text-indigo-500" style="text-shadow: 0 0 20px #6366f1;">
                    <i class="fas fa-wallet mr-2"></i>Finanças Pro
                </h1>
            </div>
            <p class="text-slate-400 mt-4 tracking-widest uppercase text-xs">Sistema de Financiamento</p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-8 mb-16">
            <div class="p-6 rounded-2xl led-green" data-aos="zoom-in">
                <p class="text-xs uppercase tracking-[0.2em] font-black mb-2 text-led-green">Entradas</p>
                <p id="total-entradas" class="text-3xl font-bold font-mono text-emerald-400">R$ 0,00</p>
            </div>

            <div class="p-6 rounded-2xl led-red" data-aos="zoom-in" data-aos-delay="100">
                <p class="text-xs uppercase tracking-[0.2em] font-black mb-2 text-led-red">Saídas</p>
                <p id="total-saidas" class="text-3xl font-bold font-mono text-rose-400">R$ 0,00</p>
            </div>

            <div class="p-6 rounded-2xl led-blink-indigo text-white" data-aos="zoom-in" data-aos-delay="200">
                <p class="text-xs opacity-70 uppercase tracking-[0.2em] font-black mb-2">Saldo Total</p>
                <p id="saldo-total" class="text-3xl font-bold font-mono text-indigo-300" style="text-shadow: 0 0 15px #6366f1;">R$ 0,00</p>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-12">
            <div class="bg-black/50 p-8 rounded-3xl led-red h-fit" data-aos="fade-right">
                <h3 class="text-lg font-bold text-rose-500 mb-8 flex items-center tracking-widest uppercase">
                    <span class="w-10 h-10 bg-rose-900/30 border border-rose-500 rounded-full flex items-center justify-center mr-4 relative overflow-hidden">
                        <i class="fas fa-rocket text-sm animate-rocket"></i>
                    </span>
                    Novo Registro
                </h3>
                <form id="form-transacao" class="space-y-6">
                    <div>
                        <label class="block text-xs font-bold text-slate-500 mb-2 uppercase">Descrição</label>
                        <input type="text" id="desc" placeholder="Ex: Investimento" required 
                            class="w-full p-4 rounded-xl">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-500 mb-2 uppercase">Valor (R$)</label>
                        <input type="number" step="0.01" id="valor" placeholder="0,00" required 
                            class="w-full p-4 rounded-xl">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-500 mb-2 uppercase">Tipo</label>
                        <select id="tipo" class="w-full p-4 rounded-xl">
                            <option value="entrada">Entrada (+)</option>
                            <option value="saida">Saída (-)</option>
                        </select>
                    </div>
                    <button type="submit" class="w-full bg-rose-600 hover:bg-rose-500 text-white font-black py-4 rounded-xl transition-all shadow-[0_0_20px_rgba(244,63,94,0.4)] uppercase tracking-tighter">
                        Confirmar Transação
                    </button>
                </form>
            </div>

            <div class="lg:col-span-2 bg-black/30 p-8 rounded-3xl border border-slate-800" data-aos="fade-left">
                <h3 class="text-lg font-bold text-indigo-400 mb-8 font-mono tracking-tighter uppercase border-b border-indigo-900/50 pb-4">Terminal de Histórico</h3>
                <div id="lista-vazia" class="text-center py-10 text-slate-600 italic">
                    Nenhum dado processado...
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <tbody id="lista-transacoes" class="divide-y divide-slate-900">
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
        <div class="h-64"></div>
    </div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({ duration: 1000, once: false, mirror: true });

        const form = document.getElementById('form-transacao');
        const lista = document.getElementById('lista-transacoes');
        const listaVazia = document.getElementById('lista-vazia');
        let transacoes = [];

        function atualizarValores() {
            const valores = transacoes.map(t => t.tipo === 'entrada' ? t.valor : -t.valor);
            const total = valores.reduce((acc, item) => acc + item, 0).toFixed(2);
            const entradas = valores.filter(v => v > 0).reduce((acc, item) => acc + item, 0).toFixed(2);
            const saidas = Math.abs(valores.filter(v => v < 0).reduce((acc, item) => acc + item, 0)).toFixed(2);

            document.getElementById('saldo-total').innerText = `R$ ${total.replace('.', ',')}`;
            document.getElementById('total-entradas').innerText = `R$ ${entradas.replace('.', ',')}`;
            document.getElementById('total-saidas').innerText = `R$ ${saidas.replace('.', ',')}`;
            listaVazia.style.display = transacoes.length > 0 ? 'none' : 'block';
        }

        function adicionarNaTela(t) {
            const corValor = t.tipo === 'entrada' ? 'text-emerald-400' : 'text-rose-400';
            const sinal = t.tipo === 'entrada' ? '+' : '-';
            const tr = document.createElement('tr');
            tr.className = "hover:bg-indigo-900/10 transition-all border-b border-slate-900";
            tr.innerHTML = `
                <td class="py-5 text-slate-300 font-medium">${t.desc}</td>
                <td class="py-5 font-bold ${corValor}">${sinal} R$ ${t.valor.toLocaleString('pt-BR', {minimumFractionDigits: 2})}</td>
                <td class="py-5 text-right">
                    <button onclick="remover(${t.id})" class="p-2 text-slate-600 hover:text-rose-500 transition-all">
                        <i class="fas fa-trash-alt"></i>
                    </button>
                </td>
            `;
            lista.appendChild(tr);
        }

        function remover(id) {
            transacoes = transacoes.filter(t => t.id !== id);
            renderizar();
        }

        function renderizar() {
            lista.innerHTML = '';
            transacoes.forEach(adicionarNaTela);
            atualizarValores();
        }

        form.addEventListener('submit', (e) => {
            e.preventDefault();
            transacoes.push({
                id: Date.now(),
                desc: document.getElementById('desc').value,
                valor: parseFloat(document.getElementById('valor').value),
                tipo: document.getElementById('tipo').value
            });
            renderizar();
            form.reset();
        });
    </script>
</body>
</html>
